<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кликер для питья воды</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:gray;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        height:100vh;
        user-select:none;
    }

    h1{
        color:white;
        margin-bottom:10px;
    }

    #counter{
        color:white;
        font-size:30px;
        margin-bottom:30px;
    }

    .glass{
        width:160px;
        height:260px;
        border:6px solid white;
        border-radius:0 0 20px 20px;
        position:relative;
        overflow:hidden;
        cursor:pointer;
        background:rgba(255,255,255,0.1);
    }

    .water{
        position:absolute;
        bottom:0;
        left:0;
        width:100%;
        height:100%;
        background:#1e90ff;
        transition:height 0.05s linear;
    }

    .hint{
        margin-top:20px;
        color:white;
    }
</style>
</head>
<body>

<h1>💧 Кликер для питья воды</h1>

<div id="counter">Выпито стаканов: 0</div>

<div class="glass" id="glass">
    <div class="water" id="water"></div>
</div>

<div class="hint">Нажми на стакан воды</div>

<script>
let count = 0;

const glass = document.getElementById("glass");
const water = document.getElementById("water");
const counter = document.getElementById("counter");

glass.addEventListener("click", () => {

    count++;
    counter.textContent = "Выпито стаканов: " + count;

    // Вода исчезает
    water.style.height = "0%";

    // Быстро наполняется снова
    let level = 0;

    const fillAnimation = setInterval(() => {
        level += 5;
        water.style.height = level + "%";

        if(level >= 100){
            clearInterval(fillAnimation);
        }
    }, 15);
});
</script>

</body>
</html>
